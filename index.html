<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perception System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'JetBrains Mono','Cascadia Mono','Fira Code',monospace}

#crt{position:fixed;inset:0;z-index:9999;pointer-events:none}
#crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.012) 2px,rgba(0,0,0,0.012) 4px)}
#crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.68) 100%)}

#flash{position:fixed;inset:0;z-index:8000;background:#fff;opacity:0;pointer-events:none}
#danger{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at center,rgba(195,12,4,0.20) 0%,rgba(135,4,0,0.05) 55%,transparent 100%);opacity:0;pointer-events:none}

/* ── SCENE: two-column row ── */
#scene{
  position:fixed;inset:0;
  display:flex;flex-direction:row;align-items:stretch;
  opacity:0;transition:opacity 0.9s ease;
  transform-origin:center 50%
}
#scene.on{opacity:1}
#scene.tvoff{animation:tvoff 4s linear forwards}
@keyframes tvoff{
  /* rapid squish to horizontal line */
  0%   {transform:scaleY(1)     scaleX(1);    filter:brightness(1)   contrast(1)}
  11%  {transform:scaleY(0.12)  scaleX(1.04); filter:brightness(2.8) contrast(1.6)}
  /* bright line persists — the long CRT plateau */
  18%  {transform:scaleY(0.038) scaleX(1.02); filter:brightness(6.5) contrast(2.2)}
  38%  {transform:scaleY(0.028) scaleX(0.98); filter:brightness(6.0) contrast(2.0)}
  58%  {transform:scaleY(0.016) scaleX(0.82); filter:brightness(4.5) contrast(1.5)}
  /* line slowly dims and collapses to a dot */
  74%  {transform:scaleY(0.007) scaleX(0.52); filter:brightness(3.0)}
  85%  {transform:scaleY(0.003) scaleX(0.26); filter:brightness(1.8)}
  93%  {transform:scaleY(0.001) scaleX(0.08); filter:brightness(1.0)}
  100% {transform:scaleY(0)     scaleX(0);    filter:brightness(0)}
}

/* ── LEFT: TERMINAL COLUMN ── */
#term-col{
  flex:0 0 58%;
  display:flex;flex-direction:column;
  background:#0c0c0c;
  border-right:1px solid rgba(255,255,255,0.05)
}

/* Windows 95-style title bar */
#term-titlebar{
  flex-shrink:0;height:28px;
  background:linear-gradient(to right,#08306a,#1464c8);
  display:flex;align-items:center;
  padding:0 5px;gap:6px;
  user-select:none
}
#ttl-icon{color:#fff;font-size:13px;line-height:1;opacity:0.85}
#ttl-path{
  flex:1;color:#fff;
  font-size:11.5px;font-weight:300;letter-spacing:0.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
#ttl-btns{display:flex;gap:2px;flex-shrink:0}
.ttl-btn{
  width:22px;height:18px;
  background:#c0c0c0;
  border:2px outset #d8d8d8;
  color:#000;font-size:10px;font-weight:400;
  cursor:default;display:flex;align-items:center;justify-content:center;
  font-family:inherit
}

/* terminal body */
#text-zone{
  flex:1;
  padding:18px 22px 22px;
  overflow-y:auto;overflow-x:hidden;
  scroll-behavior:smooth
}
#text-zone::-webkit-scrollbar{display:none}

/* ── LINES ── */
.ln{
  display:block;
  font-size:clamp(13px,1.55vw,21px);
  font-weight:300;
  line-height:1.65;
  color:rgba(0,230,100,0.86)
}
.ln.sm{
  font-size:clamp(10px,1.1vw,15px);
  color:rgba(0,200,88,0.30);
  letter-spacing:0.08em;
  text-transform:uppercase
}
.ln.name{
  font-size:clamp(28px,3.8vw,56px);
  font-weight:400;line-height:1.1;
  color:rgba(0,248,118,0.97)
}
.ln.prompt{color:rgba(0,190,78,0.36)}
.ln.err{color:rgba(255,54,20,0.88)}
.ln.result{
  font-size:clamp(20px,2.8vw,40px);
  font-weight:400;
  color:rgba(255,54,20,0.92)
}
.ln.note{
  font-size:clamp(11px,1.3vw,18px);
  color:rgba(0,175,72,0.32)
}
.ln.typing::after{
  content:'█';
  color:rgba(0,248,120,0.80);
  animation:blink 0.52s steps(1) infinite;
  font-size:0.85em
}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

/* ── RIGHT: PHOTO COLUMN ── */
#photo-col{
  flex:0 0 42%;
  position:relative;
  overflow:hidden;
  background:#000
}
#photo-wrap{
  position:absolute;
  top:-3%;left:50%;
  transform:translateX(-50%);
  height:118vh;
  display:inline-block;
  /* bottom fade into black */
  -webkit-mask-image:linear-gradient(to bottom,black 28%,rgba(0,0,0,0.80) 52%,rgba(0,0,0,0.32) 74%,transparent 90%);
  mask-image:linear-gradient(to bottom,black 28%,rgba(0,0,0,0.80) 52%,rgba(0,0,0,0.32) 74%,transparent 90%)
}
#photo-el{
  height:100%;width:auto;display:block;
  object-fit:contain;
  filter:brightness(0.88) contrast(1.06)
}
#photo-grid{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:
    linear-gradient(rgba(0,200,100,0.042) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,100,0.042) 1px,transparent 1px);
  background-size:32px 32px;
  opacity:0;transition:opacity 3s ease
}
#photo-grid.on{opacity:1}
#scan-line{
  position:absolute;left:0;right:0;height:2px;top:0;z-index:5;
  background:linear-gradient(90deg,transparent 5%,rgba(0,248,120,0.88) 35%,rgba(0,248,120,0.88) 65%,transparent 95%);
  box-shadow:0 0 12px rgba(0,248,120,0.24);opacity:0
}
#scan-line.sweep{animation:psweep 2.1s cubic-bezier(0.2,0.08,0.2,1) forwards}
@keyframes psweep{0%{top:0;opacity:0}5%{opacity:1}90%{top:100%;opacity:0.82}100%{top:100%;opacity:0}}
.cn{position:absolute;width:16px;height:16px;border-color:rgba(0,224,100,0.40);border-style:solid;opacity:0;transition:opacity 0.35s}
.cn.on{opacity:1}
.cn-tl{top:0;left:0;border-width:2px 0 0 2px}
.cn-tr{top:0;right:0;border-width:2px 2px 0 0}
.cn-bl{bottom:0;left:0;border-width:0 0 2px 2px}
.cn-br{bottom:0;right:0;border-width:0 2px 2px 0}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="warp" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.004 0.003" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div id="crt"></div>
<div id="flash"></div>
<div id="danger"></div>

<div id="scene">

  <!-- LEFT: terminal -->
  <div id="term-col">
    <div id="term-titlebar">
      <span id="ttl-icon">■</span>
      <span id="ttl-path">C:\PERCEPTION_SYSTEM\analysis.exe</span>
      <div id="ttl-btns">
        <div class="ttl-btn">_</div>
        <div class="ttl-btn">□</div>
        <div class="ttl-btn">✕</div>
      </div>
    </div>
    <div id="text-zone"></div>
  </div>

  <!-- RIGHT: photo -->
  <div id="photo-col">
    <div id="photo-wrap">
      <img id="photo-el" src="" alt="">
      <div id="photo-grid"></div>
      <div id="scan-line"></div>
      <div class="cn cn-tl" id="ctl"></div>
      <div class="cn cn-tr" id="ctr"></div>
      <div class="cn cn-bl" id="cbl"></div>
      <div class="cn cn-br" id="cbr"></div>
    </div>
  </div>

</div>

<script type="module">
function W(ms){return new Promise(r=>setTimeout(r,ms));}
function flash(){
  const f=document.getElementById('flash');
  f.style.transition='none';f.style.opacity='0.13';
  setTimeout(()=>{f.style.transition='opacity 0.07s';f.style.opacity='0';},55);
}

let sndCtx=null,masterGain=null;
let audioMuted=false;

function tryInitSnd(){
  if(sndCtx)return;
  try{
    sndCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=sndCtx.createGain();masterGain.gain.value=0.30;
    masterGain.connect(sndCtx.destination);
    drone();
  }catch(e){}
}
document.addEventListener('keydown',tryInitSnd,{once:true});
document.addEventListener('click',tryInitSnd,{once:true});

function keyClick(){
  if(!sndCtx||audioMuted)return;
  const t=sndCtx.currentTime;
  // short noise burst — mechanical key feel
  const len=Math.floor(sndCtx.sampleRate*0.024);
  const buf=sndCtx.createBuffer(1,len,sndCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3.5);
  const src=sndCtx.createBufferSource();src.buffer=buf;
  const g=sndCtx.createGain();
  g.gain.setValueAtTime(0.055,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.022);
  src.connect(g);g.connect(masterGain);src.start(t);
  // subtle low thud
  const o=sndCtx.createOscillator();const og=sndCtx.createGain();
  o.type='sine';o.frequency.value=190;
  og.gain.setValueAtTime(0.032,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.014);
  o.connect(og);og.connect(masterGain);o.start(t);o.stop(t+0.016);
}

function chirp(){
  if(!sndCtx||audioMuted)return;
  const t=sndCtx.currentTime,o=sndCtx.createOscillator(),g=sndCtx.createGain();
  o.type='triangle';o.frequency.setValueAtTime(1480,t);o.frequency.exponentialRampToValueAtTime(820,t+0.06);
  g.gain.setValueAtTime(0.048,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.10);
}
function beep(f=800,d=0.07,v=0.06){
  if(!sndCtx||audioMuted)return;
  const t=sndCtx.currentTime,o=sndCtx.createOscillator(),g=sndCtx.createGain();
  o.type='square';o.frequency.value=f;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+d);
}
function alarm(){
  if(!sndCtx||audioMuted)return;
  const t=sndCtx.currentTime;
  [0,0.13,0.26].forEach((off,i)=>{
    const o=sndCtx.createOscillator(),g=sndCtx.createGain();
    o.type='sawtooth';o.frequency.value=200+i*50;
    g.gain.setValueAtTime(0.045,t+off);g.gain.exponentialRampToValueAtTime(0.001,t+off+0.10);
    o.connect(g);g.connect(masterGain);o.start(t+off);o.stop(t+off+0.12);
  });
}
function drone(){
  if(!sndCtx)return;
  const t=sndCtx.currentTime,o=sndCtx.createOscillator(),g=sndCtx.createGain();
  o.type='sine';o.frequency.value=46;
  const l=sndCtx.createOscillator(),lg=sndCtx.createGain();
  l.frequency.value=0.13;lg.gain.value=3;
  l.connect(lg);lg.connect(o.frequency);l.start(t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.020,t+4);
  g.gain.linearRampToValueAtTime(0.020,t+80);g.gain.exponentialRampToValueAtTime(0.001,t+83);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+83);
}

let dpId=null;
function startDanger(){
  if(dpId)return;
  const ov=document.getElementById('danger');let ph=0;
  dpId=setInterval(()=>{ph+=0.044;ov.style.opacity=((Math.sin(ph)*0.5+0.5)*0.68).toFixed(3);},28);
}
function stopDanger(){
  if(dpId){clearInterval(dpId);dpId=null;}
  document.getElementById('danger').style.opacity='0';
}

/* ── LIQUID WARP ── */
const turb=document.getElementById('turb');
const disp=document.getElementById('disp');
const photoEl=document.getElementById('photo-el');
const WARP=[
  [0.004,0.003,0  ],  // level 0: no displacement during cycling phase
  [0.013,0.009,6  ],
  [0.030,0.024,20 ],
  [0.058,0.044,46 ],
  [0.112,0.090,88 ],
];
let warpCur=0,warpTgt=0;
const wT0=performance.now();
function lerp(a,b,t){return a+(b-a)*t;}
function warpLoop(now){
  warpCur+=(warpTgt-warpCur)*0.022;
  const t=(now-wT0)*0.001;
  const lvl=Math.min(warpCur,3.99);
  const fl=Math.floor(lvl),tl=lvl-fl;
  const a=WARP[fl],b=WARP[Math.min(fl+1,4)];
  const bBFX=lerp(a[0],b[0],tl),bBFY=lerp(a[1],b[1],tl),bSc=lerp(a[2],b[2],tl);
  const osc=0.28+warpCur*0.14;
  const bfx=bBFX*(1+Math.sin(t*0.62)*osc);
  const bfy=bBFY*(1+Math.sin(t*0.84+1.4)*osc);
  const sc=bSc*(1+Math.sin(t*0.46+0.9)*osc*0.55);
  turb.setAttribute('baseFrequency',`${Math.max(0.001,bfx).toFixed(4)} ${Math.max(0.001,bfy).toFixed(4)}`);
  disp.setAttribute('scale',Math.max(0,sc).toFixed(2));
  if(!photoEl.style.filter.includes('url(#warp)')){
    photoEl.style.filter='url(#warp) brightness(0.88) contrast(1.06)';
  }
  requestAnimationFrame(warpLoop);
}
requestAnimationFrame(warpLoop);
function setWarp(t){warpTgt=t;}

/* ── TYPEWRITER ── */
const tz=document.getElementById('text-zone');

async function type(el,text,speed=18){
  el.classList.add('typing');
  for(const ch of text){
    el.textContent+=ch;
    tz.scrollTop=tz.scrollHeight;
    if(ch!==' ') keyClick();
    await W(speed+(Math.random()*6|0));
  }
  el.classList.remove('typing');
}

async function line(text,cls='',speed=18,after=0){
  const d=document.createElement('div');
  d.className='ln'+(cls?' '+cls:'');
  tz.appendChild(d);
  await type(d,text,speed);
  tz.scrollTop=tz.scrollHeight;
  if(after)await W(after);
  return d;
}

async function blank(ms=50){
  const d=document.createElement('div');d.className='ln';d.innerHTML='&nbsp;';
  tz.appendChild(d);tz.scrollTop=tz.scrollHeight;await W(ms);
}

/* ── PHOTO CYCLING ── */
const CYCLE_PHOTOS = [
  'sid vids and pics/DSC_0371.JPG',
  'sid vids and pics/IMG_9384.jpg',
];
const WARP_PHOTO = 'sid vids and pics/sidpic.png';

async function crossfadeTo(src, dur=600){
  // zoom out + fade away
  photoEl.style.transition=`opacity ${dur*0.45}ms ease, transform ${dur*0.45}ms ease`;
  photoEl.style.opacity='0';
  photoEl.style.transform='scale(1.06)';
  await W(dur*0.45+30);

  // swap src, reset to slightly zoomed out
  photoEl.src=src;
  photoEl.style.transition='none';
  photoEl.style.transform='scale(0.94)';
  photoEl.style.opacity='0';
  await W(40); // allow repaint

  // zoom in + fade in
  photoEl.style.transition=`opacity ${dur*0.55}ms ease, transform ${dur*0.7}ms cubic-bezier(0.22,1,0.36,1)`;
  photoEl.style.opacity='1';
  photoEl.style.transform='scale(1)';
  await W(dur*0.7);
}

/* ── MAIN SEQUENCE ── */
async function run(){

  const scene=document.getElementById('scene');

  // start with first cycling photo
  photoEl.src = CYCLE_PHOTOS[0];
  scene.classList.add('on');
  await W(700);

  // scan
  ['ctl','ctr','cbl','cbr'].forEach(id=>document.getElementById(id).classList.add('on'));
  document.getElementById('scan-line').classList.add('sweep');
  chirp();
  await W(400);
  document.getElementById('photo-grid').classList.add('on');

  // ACT 1 — IDENTITY (cycling photos while typing)
  await line("today's subject:  Siddharth Mehta",'',14,100);

  // cycle to second photo during date line
  crossfadeTo(CYCLE_PHOTOS[1], 1100);
  await line('date range:       1999 — 2026','',14,800);

  // hold, then gradually land on warp portrait
  await W(1500);
  await crossfadeTo(WARP_PHOTO, 1100);

  // ACT 2 — DATA (warp begins on the main portrait)
  setWarp(1);
  await blank(40);
  await line('curiosity_drive   = elevated',   '',12,200); chirp();
  await line('wonder_index      = 0.88',        '',12,200); chirp();
  await line('what_he_builds    = experiences', '',12,200); chirp();
  await line('what_he_fears     = irrelevance', '',12,200); chirp();
  await line('identity_state    = [UNDEFINED]', '',12,340);

  setWarp(2.2);
  await blank(60);

  // ACT 3 — FAIL
  setWarp(3.5);
  alarm();startDanger();
  await W(200);
  await line('WARNING: ambiguous_pattern detected','err',11,120); beep(310,0.07,0.06);
  await line('ERROR:   no_matching_schema',         'err',11,120); beep(280,0.07,0.06);
  await line('ERROR:   pattern_undefined',          'err',11,160);

  setWarp(4);
  await W(220);
  alarm();
  await blank(30);
  await line('RESULT:  ∅  UNCLASSIFIABLE','result',11,400);
  await blank(20);
  await line("some things don't fit in boxes.",'note',12,300);

  await W(700);
  stopDanger();

  // TV OFF — sequence ends on black
  scene.classList.add('tvoff');
  await W(240);
  flash();await W(62);flash();await W(46);flash();
}

run();
</script>
</body>
</html>
